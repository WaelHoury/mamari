name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  goreleaser:
    # Darwin cgo targets need the Apple SDK. Zig cross-compiles the Linux and
    # Windows targets from this host.
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install pinned Zig
        run: |
          zig_dir="$(./scripts/install-zig.sh "${RUNNER_TEMP}/zig")"
          echo "${zig_dir}" >> "${GITHUB_PATH}"

      - name: Verify Zig version
        run: test "$(zig version)" = "0.16.0"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          distribution: goreleaser
          version: v2.16.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAMARI_ZIG_CACHE_ROOT: ${{ runner.temp }}/mamari-zig-cache

      - name: Verify release artifacts
        run: ./scripts/verify-release.sh dist

      - name: Attest release artifacts
        if: github.event.repository.visibility == 'public'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-checksums: dist/checksums.txt
